<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto con Tailwind CSS</title>
    <link rel="icon" type="favicon/x-icon" href="img/supertux.png" />
    <link href="/src/style.css" rel="stylesheet" />
  </head>

  <body class="bg-[url(/img/pattern.png)] bg-scroll">
    <!--Inicio de Cabecera-->
    <header id="header" class="bg-black bebas font-sans text-white xs:h-36 md:h-20">
      <div class="md:container md:w-11/12 mx-auto flex xs:flex-col md:flex-row">
        <div id="logo" class="flex-1 xs:mx-auto">
          <div
            class="bg-azul-claro cursor-pointer group duration-300 hover:text-black mt-4 pb-0.5 pt-0.5 overflow-hidden rounded-sm text-center tracking-wider transition w-64"
          >
            <span class="animate-spin-low  group-hover:animate-none group-hover:animate-from-bellow  block float-left mt-1 ml-11 text-3xl symbol">S</span>
            <!-- https://www.fontsquirrel.com/fonts/web-symbols -->
            <h3
              class="block group-hover:animate-from-right float-right mt-1.5 mr-16 text-4xl transition duration-100"
            >
              TAILWIND
            </h3>
          </div>
        </div>

        <nav id="menu" class="flex-1">
          <ul class="flex flex-row h-20 items-center md:justify-end text-2xl text-center">
            <li class="menu-item"><a href="#">INICIO</a></li>
            <li class="menu-item"><a href="#">BLOG</a></li>
            <li class="menu-item"><a href="#">FORMACIÓN</a></li>
            <li class="menu-item"><a href="#">CONTACTO</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <!--Fin de Cabecera-->

    <!-- Inicio de Sección de Información -->
    <section class="md:container md:w-11/12 xs:w-full mx-auto">
      <!-- Inicio Banner -->
      <div
        id="banner"
        class="bg-banner bg-position-banner animate-bg-banner w-full h-28 mx-auto border-8 border-white overflow-hidden shadow m-5"
      >
        <h1
          class="bebas animate-show-banner-text text-white text-4xl font-normal tracking-wider m-7 mx-auto text-center text-shadow-banner"
        >
          CURSOS DE DESARROLLO WEB
        </h1>
      </div>
      <!-- Fin Banner -->
    </section>
    <!-- Fin de Sección de Información -->
  </body>
</html>
